name: Ruff Lint

on:
  workflow_dispatch:
  push:
    paths:
      - "custom_components/neopool/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".github/workflows/ruff.yaml"
  pull_request:
    paths:
      - "custom_components/neopool/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".github/workflows/ruff.yaml"

permissions:
  contents: read

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade ruff

      - name: Run Ruff format check
        run: ruff format --check custom_components/neopool tests

      - name: Run Ruff lint check
        run: ruff check custom_components/neopool tests
