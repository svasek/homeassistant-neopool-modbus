name: Alpha Release

on:
  # Manual trigger from Actions tab – pick any branch
  workflow_dispatch:
    inputs:
      version_suffix:
        description: "Pre-release suffix"
        required: false
        default: "alpha"
        type: choice
        options:
          - alpha
          - beta
          - rc
      bump_type:
        description: "Version bump type"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - minor
          - patch

  # Comment "/alpha-release" on a PR to create an alpha from that PR branch
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  alpha-release:
    runs-on: ubuntu-latest
    # Run on workflow_dispatch OR when a PR comment matches one of the trigger commands
    # Only repo owner or collaborators can trigger via comment
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR') &&
       (startsWith(github.event.comment.body, '/alpha-release') ||
        startsWith(github.event.comment.body, '/release-alpha') ||
        startsWith(github.event.comment.body, '/dev-release') ||
        startsWith(github.event.comment.body, '/release-dev')))
    steps:
      # ── 1. Resolve the branch to build ──────────────────────────────
      - name: Get PR info (issue_comment)
        if: github.event_name == 'issue_comment'
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.issue.number }}
        run: |
          PR_JSON=$(gh api "repos/${REPO}/pulls/${PR_NUM}")
          echo "ref=$(echo "$PR_JSON" | jq -r .head.ref)" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo "$PR_JSON" | jq -r .head.sha)" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$PR_JSON" | jq -r .title)" >> "$GITHUB_OUTPUT"
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "url=$(echo "$PR_JSON" | jq -r .html_url)" >> "$GITHUB_OUTPUT"

          # Fetch linked/closing issues via GraphQL
          ISSUES=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  closingIssuesReferences(first: 10) {
                    nodes { number url title }
                  }
                }
              }
            }' -f owner="${REPO%%/*}" -f repo="${REPO##*/}" -F pr="${PR_NUM}" \
            --jq '.data.repository.pullRequest.closingIssuesReferences.nodes | map(.number | tostring) | join(",")')
          echo "linked_issues=${ISSUES}" >> "$GITHUB_OUTPUT"
          echo "📎 Linked issues: ${ISSUES:-none}"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'issue_comment' && steps.pr.outputs.ref || github.ref }}
          fetch-depth: 0

      # ── 2. Calculate alpha version ──────────────────────────────────
      - name: Determine bump type from PR title
        id: bump
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_TITLE_FROM_API: ${{ steps.pr.outputs.title }}
          EVENT_NAME: ${{ github.event_name }}
          BUMP_INPUT: ${{ github.event.inputs.bump_type }}
        run: |
          # Parse optional override from comment (e.g. "/alpha-release minor")
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            OVERRIDE=$(echo "$COMMENT_BODY" | awk '{print $2}')
            if [[ "$OVERRIDE" == "minor" || "$OVERRIDE" == "feat" ]]; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
              echo "🔧 Bump type from comment override: minor ($OVERRIDE)"
              exit 0
            elif [[ "$OVERRIDE" == "patch" || "$OVERRIDE" == "fix" ]]; then
              echo "type=patch" >> "$GITHUB_OUTPUT"
              echo "🔧 Bump type from comment override: patch ($OVERRIDE)"
              exit 0
            fi
            PR_TITLE="$PR_TITLE_FROM_API"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" && "$BUMP_INPUT" != "auto" ]]; then
            echo "type=$BUMP_INPUT" >> "$GITHUB_OUTPUT"
            echo "🔧 Bump type from manual input: $BUMP_INPUT"
            exit 0
          else
            # Try to find an open PR for the current branch
            PR_TITLE=$(gh pr view --json title -q .title 2>/dev/null || echo "")
          fi

          echo "PR title: $PR_TITLE"

          # Detect type from conventional commit prefix in PR title
          if echo "$PR_TITLE" | grep -qiP '^feat[(!:]'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
            echo "✨ Detected feat → minor bump"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
            echo "🐛 Detected fix/other → patch bump"
          fi

      - name: Determine alpha version
        id: version
        run: |
          CURRENT=$(jq -r .version custom_components/neopool/manifest.json)
          SUFFIX="${{ github.event.inputs.version_suffix || 'alpha' }}"
          BUMP="${{ steps.bump.outputs.type }}"

          # Split current version into major.minor.patch (strip any existing pre-release)
          BASE=$(echo "$CURRENT" | grep -oP '^\d+\.\d+\.\d+')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

          if [[ "$BUMP" == "minor" ]]; then
            NEXT_MINOR=$((MINOR + 1))
            ALPHA_BASE="${MAJOR}.${NEXT_MINOR}.0"
          else
            NEXT_PATCH=$((PATCH + 1))
            ALPHA_BASE="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)

          # Count existing tags for this base+suffix to get next sequential number
          EXISTING=$(git tag -l "v${ALPHA_BASE}-${SUFFIX}.*" | wc -l)
          NEXT=$((EXISTING + 1))

          ALPHA_VERSION="${ALPHA_BASE}-${SUFFIX}.${NEXT}"
          TAG="v${ALPHA_VERSION}"

          echo "version=$ALPHA_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "📦 Alpha version: $ALPHA_VERSION ($TAG) [${BUMP} bump]"

      # ── 3. Build release zip ────────────────────────────────────────
      - name: Patch manifest.json with alpha version
        env:
          ALPHA_VERSION: ${{ steps.version.outputs.version }}
        run: |
          jq --arg v "$ALPHA_VERSION" '.version = $v' \
            custom_components/neopool/manifest.json > tmp.$$.json
          mv tmp.$$.json custom_components/neopool/manifest.json
          echo "✅ manifest.json version set to $ALPHA_VERSION"

      - name: Create release archive
        run: |
          cd custom_components/neopool
          zip -r ../../neopool_modbus.zip . -x "*.pyc" -x "__pycache__/*" -x "tmp/*"
          cd ../..
          echo "📦 Created neopool_modbus.zip"
          ls -lh neopool_modbus.zip

      # ── 4. Create GitHub pre-release ────────────────────────────────
      - name: Create GitHub pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event_name == 'issue_comment' && steps.pr.outputs.ref || github.ref_name }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
        run: |
          # Build PR reference line if available
          PR_LINE=""
          if [[ -n "$PR_NUMBER" ]]; then
            PR_LINE="**Pull Request:** [#${PR_NUMBER} – ${PR_TITLE}](${PR_URL})"
          fi

          NOTES="## 🧪 Alpha Pre-release \`${VERSION}\`

          ${PR_LINE}
          **Branch:** \`${BRANCH}\`
          **Commit:** \`${SHORT_SHA}\`

          > ⚠️ This is a **pre-release** for testing purposes only.
          > To install via HACS, enable *Show beta versions* in the integration settings.

          ### Installation
          1. Open HACS → Integrations → VistaPool Modbus
          2. Click ⋮ → *Redownload* → enable *Show beta versions*
          3. Select version \`${VERSION}\` and install
          4. Restart Home Assistant"

          gh release create "$TAG" neopool_modbus.zip \
            --title "🧪 ${TAG} (alpha)" \
            --notes "$NOTES" \
            --prerelease \
            --target "$(git rev-parse HEAD)"

      # ── 5. Comment on PR (if triggered from a PR comment) ──────────
      - name: Comment on PR
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          COMMENT="🧪 **Alpha pre-release created:** [\`${VERSION}\`](${RELEASE_URL})

          To install via HACS:
          1. Open HACS → Integrations → VistaPool Modbus
          2. Click ⋮ → *Redownload* → enable *Show beta versions*
          3. Select version \`${VERSION}\` and install
          4. Restart Home Assistant"

          gh pr comment "$PR_NUMBER" --body "$COMMENT"

      - name: Comment on linked issues
        if: github.event_name == 'issue_comment' && steps.pr.outputs.linked_issues != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          LINKED_ISSUES: ${{ steps.pr.outputs.linked_issues }}
        run: |
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          IFS=',' read -ra ISSUES <<< "$LINKED_ISSUES"
          for ISSUE_NUM in "${ISSUES[@]}"; do
            COMMENT="🧪 **Alpha pre-release [\`${VERSION}\`](${RELEASE_URL})** is available for testing (from PR #${PR_NUMBER}).

          To install via HACS:
          1. Open HACS → Integrations → VistaPool Modbus
          2. Click ⋮ → *Redownload* → enable *Show beta versions*
          3. Select version \`${VERSION}\` and install
          4. Restart Home Assistant"

            gh issue comment "$ISSUE_NUM" --body "$COMMENT"
            echo "💬 Commented on issue #${ISSUE_NUM}"
          done
