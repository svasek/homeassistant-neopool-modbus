set_timer:
  fields:
    entry_id:
      example: "your-entry-id"
      selector:
        text:
    timer:
      required: true
      example: "filtration1"
      selector:
        text:
    start:
      example: "08:00"
      selector:
        text:
    stop:
      example: "10:00"
      selector:
        text:
    period:
      example: 86400
      selector:
        number:
          min: 1
          max: 604800
          step: 1
    enable:
      example: 1
      selector:
        number:
          min: 0
          max: 4
          step: 1

write_register:
  fields:
    entry_id:
      example: "your-entry-id"
      selector:
        text:
    address:
      required: true
      example: "0x0432"
      selector:
        text:
    value:
      required: true
      example: "2"
      selector:
        text:
    apply:
      example: true
      default: true
      selector:
        boolean:

read_register:
  fields:
    entry_id:
      example: "your-entry-id"
      selector:
        text:
    address:
      required: true
      example: "0x0102"
      selector:
        text:
    count:
      example: 1
      default: 1
      selector:
        number:
          min: 1
          max: 31
          step: 1
